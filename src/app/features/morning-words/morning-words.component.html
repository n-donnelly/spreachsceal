<div class="morning-words-container">
  <div class="zen-header">
    <h1>The Ether</h1>
    <p>For thoughts that need to be written but not kept...</p>
  </div>

  <div class="editor-wrapper">
    <textarea 
      #editor
      class="zen-textarea"
      [class.fading]="isFading()"
      [ngModel]="content()"
      (ngModelChange)="content.set($event)"
      (keydown)="onKeyDown($event)"
      placeholder="Just write..."
      [readonly]="isFading()"
    ></textarea>
  </div>
</div>
