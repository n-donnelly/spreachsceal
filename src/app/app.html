@if (authService.currentUser() !== undefined) {
  @if (authService.currentUser()) {
    <div class="app-layout">
      <!-- Mobile Overlay -->
      <div class="mobile-overlay" [class.open]="isSidebarOpen()" (click)="closeSidebar()"></div>

      <aside class="sidebar" [class.open]="isSidebarOpen()">
        <div class="sidebar-header">
          <h2>Spréachscéal</h2>
          <button class="close-btn" (click)="closeSidebar()">×</button>
        </div>
        <nav class="sidebar-nav">
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeSidebar()">
            <span class="icon">🏠</span> Dashboard
          </a>
          <a routerLink="/ideas" routerLinkActive="active" (click)="closeSidebar()">
            <span class="icon">💡</span> Ideas Notebook
          </a>
          <a routerLink="/the-ether" routerLinkActive="active" (click)="closeSidebar()">
            <span class="icon">☁️</span> The Ether
          </a>
          <a routerLink="/archive" routerLinkActive="active" (click)="closeSidebar()">
            <span class="icon">🗄️</span> Archive
          </a>
        </nav>
        <div class="sidebar-footer">
          <div style="margin-bottom: 0.75rem; font-size: 0.875rem; color: var(--text-secondary); text-align: center; word-break: break-all;">
            {{ authService.currentUser()?.email }}
          </div>
          <button class="theme-toggle" (click)="toggleTheme()">
            {{ isDarkMode() ? '☀️ Light Mode' : '🌙 Dark Mode' }}
          </button>
          <button class="theme-toggle" (click)="authService.logout()" style="margin-top: 0.5rem; color: #ef4444;">
            🚪 Logout
          </button>
        </div>
      </aside>

      <main class="main-content">
        <header class="top-nav">
          <button class="hamburger-btn" (click)="toggleSidebar()">☰</button>
          <h2 class="mobile-app-title">Spréachscéal</h2>
        </header>
        <div class="content-area">
          <router-outlet></router-outlet>
        </div>
      </main>
    </div>
  } @else {
    <router-outlet></router-outlet>
  }
}

<app-toast></app-toast>
